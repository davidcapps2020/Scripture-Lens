<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDA Scripture Lens | Biblical Research Tool</title>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Styling & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- OCR Engine -->
    <script src="https://unpkg.com/tesseract.js@5.0.5/dist/tesseract.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,600&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .serif-italic { font-family: 'Playfair Display', serif; }
        .scanning-line {
            height: 2px;
            background: linear-gradient(to right, transparent, #fbbf24, transparent);
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 10%; }
            100% { top: 90%; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('camera'); 
            const [stream, setStream] = useState(null);
            const [photo, setPhoto] = useState(null);
            const [extractedText, setExtractedText] = useState("");
            const [analysis, setAnalysis] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [status, setStatus] = useState("Initializing...");
            const [cameraError, setCameraError] = useState(null);
            const [apiKey, setApiKey] = useState(localStorage.getItem('sda_lens_api_key') || "");
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            const SYSTEM_PROMPT = `You are an SDA Biblical Research Scholar. Analyze the text provided. 
1. Identify the verse precisely. 
2. Provide a commentary grounded in the SDA 28 Fundamental Beliefs. 
3. Focus on: Sanctuary doctrine, Three Angels' Messages, the Sabbath, and the Great Controversy. 
4. Explain the 'Present Truth' aspect for today's world. 
5. Maintain a tone of the Blessed Hope and Christ's soon return.`;

            useEffect(() => {
                lucide.createIcons();
            }, [view, analysis, isLoading]);

            useEffect(() => {
                if (view === "camera") initCamera();
                else stopCamera();
                return () => stopCamera();
            }, [view]);

            const stopCamera = () => {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    setStream(null);
                }
            };

            const initCamera = async () => {
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    setCameraError("Browser security blocks camera. Please use Upload.");
                    return;
                }

                setStatus("Scanning for hardware...");
                try {
                    const constraints = { 
                        video: { 
                            facingMode: { ideal: 'environment' },
                            width: { ideal: 1280 }
                        } 
                    };
                    const mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    setStream(mediaStream);
                    if (videoRef.current) videoRef.current.srcObject = mediaStream;
                    setStatus("Ready to scan Scripture");
                } catch (err) {
                    try {
                        const fallback = await navigator.mediaDevices.getUserMedia({ video: true });
                        setStream(fallback);
                        if (videoRef.current) videoRef.current.srcObject = fallback;
                        setStatus("Default camera active");
                    } catch (e) {
                        setCameraError("Camera unavailable. Use the upload button.");
                        setStatus("Hardware not found");
                    }
                }
            };

            const handleCapture = () => {
                const canvas = canvasRef.current;
                const video = videoRef.current;
                if (!video || !canvas) return;
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                processImage(canvas.toDataURL('image/jpeg', 0.8));
            };

            const processImage = async (imageData) => {
                setPhoto(imageData);
                setView("results");
                setIsLoading(true);
                setStatus("Reading via Tesseract...");
                try {
                    const { data: { text } } = await Tesseract.recognize(imageData, 'eng');
                    const cleanText = text.replace(/\s+/g, ' ').trim() || "Exodus 20:8-11";
                    setExtractedText(cleanText);
                    performTheologicalAnalysis(cleanText);
                } catch (err) {
                    setExtractedText("Text identification failed.");
                    setIsLoading(false);
                }
            };

            const performTheologicalAnalysis = async (text) => {
                setStatus("Consulting SDA Research...");
                setIsLoading(true);
                
                if (!apiKey) {
                    setTimeout(() => {
                        setAnalysis(`[DEMO MODE] This verse aligns with SDA Fundamental Beliefs. To see deep research, please add a Gemini API Key in Settings. 

General Insight: This text underscores God's sovereignty and the Great Controversy theme. In Adventist theology, we see this as part of the 'Present Truth' intended for a people waiting for the Second Coming.`);
                        setIsLoading(false);
                    }, 1800);
                    return;
                }

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Verse: "${text}"` }] }],
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                        })
                    });
                    const result = await response.json();
                    if (result.error) throw new Error(result.error.message);
                    setAnalysis(result.candidates?.[0]?.content?.parts?.[0]?.text || "Consult the SDA Bible Commentary.");
                } catch (e) { 
                    setAnalysis(`Error: ${e.message}. Ensure your API key is valid.`); 
                }
                setIsLoading(false);
            };

            return (
                <div className="h-screen bg-slate-50 flex flex-col max-w-md mx-auto shadow-2xl relative overflow-hidden">
                    {/* Header */}
                    <header className="bg-[#2b4c7e] text-white p-5 pt-12 md:pt-5 shadow-lg flex items-center justify-between z-50">
                        <div className="flex items-center gap-3">
                            <div className="bg-amber-400 p-2 rounded-xl shadow-md">
                                <i data-lucide="book-open" className="text-[#2b4c7e] w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="font-extrabold text-lg tracking-tight leading-none">Scripture Lens</h1>
                                <p className="text-[9px] text-blue-200 font-bold uppercase tracking-[0.2em] mt-1">Adventist Biblical Research</p>
                            </div>
                        </div>
                        <button onClick={() => setView(view === 'settings' ? 'camera' : 'settings')} className="p-2 hover:bg-white/10 rounded-full transition-all">
                            <i data-lucide={view === 'settings' ? "x" : "settings"} className="w-6 h-6"></i>
                        </button>
                    </header>

                    {/* Main Content Area */}
                    <main className="flex-1 relative overflow-hidden flex flex-col bg-white">
                        {view === 'settings' && (
                            <div className="p-6 space-y-6 animate-in fade-in slide-in-from-right-4">
                                <div>
                                    <h2 className="text-xl font-bold text-slate-800">Research Settings</h2>
                                    <p className="text-xs text-slate-500 mt-1">Configure your AI connection for live research.</p>
                                </div>
                                <div className="bg-slate-50 p-5 rounded-2xl border border-slate-200 space-y-4">
                                    <label className="text-[10px] font-black text-[#2b4c7e] uppercase tracking-widest">Google Gemini API Key</label>
                                    <div className="relative">
                                        <input 
                                            type="password" 
                                            value={apiKey} 
                                            onChange={(e) => {setApiKey(e.target.value); localStorage.setItem('sda_lens_api_key', e.target.value);}} 
                                            className="w-full p-4 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none pr-12 text-sm" 
                                            placeholder="Paste key here..." 
                                        />
                                        <i data-lucide="key" className="absolute right-4 top-4 text-slate-300 w-5 h-5"></i>
                                    </div>
                                    <p className="text-[10px] text-slate-400 leading-relaxed italic">Your key is stored locally on this device. Without a key, the app runs in 'Demo Mode'.</p>
                                </div>
                                <button onClick={() => setView('camera')} className="w-full py-4 bg-[#2b4c7e] text-white rounded-2xl font-bold shadow-xl hover:bg-blue-800 active:scale-95 transition-all">
                                    Save & Begin Study
                                </button>
                            </div>
                        )}

                        {view === 'camera' && (
                            <div className="flex-1 flex flex-col">
                                <div className="flex-1 bg-black relative flex items-center justify-center overflow-hidden">
                                    {cameraError ? (
                                        <div className="text-center p-8 space-y-6 z-20">
                                            <div className="bg-white/10 p-6 rounded-full inline-block">
                                                <i data-lucide="camera-off" className="text-white w-12 h-12 opacity-50"></i>
                                            </div>
                                            <p className="text-white/80 text-sm font-medium">{cameraError}</p>
                                            <button onClick={() => fileInputRef.current.click()} className="px-8 py-4 bg-amber-400 rounded-2xl font-black text-[#2b4c7e] shadow-2xl active:scale-95 transition-all">
                                                UPLOAD PHOTO
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover opacity-90" />
                                            <div className="absolute inset-0 pointer-events-none flex items-center justify-center p-10">
                                                <div className="w-full aspect-[4/3] border-2 border-amber-400/40 rounded-3xl relative">
                                                    <div className="scanning-line"></div>
                                                    <div className="absolute -top-1 -left-1 w-6 h-6 border-t-4 border-l-4 border-amber-400 rounded-tl-lg"></div>
                                                    <div className="absolute -top-1 -right-1 w-6 h-6 border-t-4 border-r-4 border-amber-400 rounded-tr-lg"></div>
                                                    <div className="absolute -bottom-1 -left-1 w-6 h-6 border-b-4 border-l-4 border-amber-400 rounded-bl-lg"></div>
                                                    <div className="absolute -bottom-1 -right-1 w-6 h-6 border-b-4 border-r-4 border-amber-400 rounded-br-lg"></div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                                <div className="p-8 bg-white border-t-[6px] border-[#2b4c7e] rounded-t-[40px] -mt-10 z-30 flex flex-col items-center gap-6 shadow-2xl">
                                    <div className="flex items-center gap-10">
                                        <button onClick={() => fileInputRef.current.click()} className="p-4 text-slate-300 hover:text-[#2b4c7e] transition-colors">
                                            <i data-lucide="image" className="w-7 h-7"></i>
                                        </button>
                                        <button onClick={handleCapture} className="w-20 h-20 rounded-full bg-[#2b4c7e] border-[8px] border-slate-50 shadow-2xl flex items-center justify-center active:scale-90 transition-all">
                                            <i data-lucide="camera" className="text-white w-8 h-8"></i>
                                        </button>
                                        <button onClick={() => setView('settings')} className="p-4 text-slate-300 hover:text-amber-500 transition-colors">
                                            <i data-lucide="info" className="w-7 h-7"></i>
                                        </button>
                                    </div>
                                    <div className="text-center">
                                        <span className="px-3 py-1 bg-slate-100 rounded-full text-[9px] text-[#2b4c7e] font-black uppercase tracking-[0.2em]">{status}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="flex-1 flex flex-col p-6 space-y-6 overflow-y-auto custom-scrollbar">
                                <div className="relative rounded-3xl shadow-xl border overflow-hidden shrink-0 h-44">
                                    <img src={photo} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-[#2b4c7e] via-[#2b4c7e]/20 to-transparent flex flex-col justify-end p-4">
                                        <p className="text-white text-sm serif-italic leading-tight">"{extractedText}"</p>
                                    </div>
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="flex items-center justify-between border-b border-slate-100 pb-2">
                                        <h3 className="text-[#2b4c7e] font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                                            <i data-lucide="sparkles" className="text-amber-500 w-4 h-4"></i> Theological Insight
                                        </h3>
                                        <i data-lucide="bookmark" className="text-slate-300 w-4 h-4"></i>
                                    </div>

                                    {isLoading ? (
                                        <div className="py-20 text-center space-y-4 animate-pulse">
                                            <div className="w-12 h-12 border-4 border-[#2b4c7e] border-t-transparent rounded-full animate-spin mx-auto"></div>
                                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{status}</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-4 animate-in fade-in duration-700">
                                            {analysis.split('\n').map((line, i) => (
                                                <p key={i} className="text-slate-700 text-[14px] leading-relaxed serif-italic">
                                                    {line}
                                                </p>
                                            ))}
                                            <div className="p-4 bg-amber-50 rounded-2xl border-l-4 border-amber-400">
                                                <p className="text-[11px] text-slate-600 italic font-medium leading-relaxed">
                                                    This commentary reflects the Great Controversy framework and Adventist hermeneutics.
                                                </p>
                                            </div>
                                        </div>
                                    )}
                                </div>

                                <button onClick={() => setView('camera')} className="w-full py-4 bg-[#2b4c7e] text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 mt-auto">
                                    <i data-lucide="refresh-cw" className="w-5 h-5"></i> Scan Another
                                </button>
                            </div>
                        )}
                    </main>

                    {/* Hidden Elements */}
                    <canvas ref={canvasRef} className="hidden" />
                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => {
                        if (e.target.files && e.target.files[0]) {
                            const reader = new FileReader();
                            reader.onload = (ev) => processImage(ev.target.result);
                            reader.readAsDataURL(e.target.files[0]);
                        }
                    }} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
