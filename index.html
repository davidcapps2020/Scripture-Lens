<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SDA Scripture Lens | Prophetic Research</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,600&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .serif-italic { font-family: 'Playfair Display', serif; }
        .scanning-line {
            height: 3px;
            background: linear-gradient(to right, transparent, #fbbf24, transparent);
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 2.5s linear infinite;
        }
        @keyframes scan {
            0% { top: 20%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 80%; opacity: 0; }
        }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .bg-sda-blue { background-color: #2b4c7e; }
    </style>
</head>
<body class="bg-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const LOCAL_LIBRARY = [
            {
                keywords: ["sabbath", "seventh", "holy day", "commandment", "remember", "rested", "law"],
                title: "The Sabbath: Sign of Loyalty",
                summary: "This passage identifies the sacred time established at Creation as a memorial of God's redemptive power.",
                pillar: "Fundamental Belief #20",
                egw: "E.G. White in 'The Great Controversy' notes that the Sabbath will be the great test of loyalty. It is the 'seal' of God's law, distinguishing those who worship the Creator.",
                pastoral: "The Sabbath is a celebration of 'Rest in Christ.' It is the core of the First Angel's Message to worship Him who made heaven and earth."
            },
            {
                keywords: ["sanctuary", "temple", "priest", "lamb", "blood", "cleansed", "1844", "judgment"],
                title: "The Sanctuary & Investigative Judgment",
                summary: "This text focuses on the mediatorial work of our High Priest in the heavenly courts.",
                pillar: "Fundamental Belief #24",
                egw: "As E.G. White wrote, 'The subject of the sanctuary was the key which unlocked the mystery of the disappointment of 1844.'",
                pastoral: "Christ is currently in the Most Holy Place, finishing His work before probation closes. This is our 'Present Truth' focus."
            },
            {
                keywords: ["death", "sleep", "dead", "grave", "soul", "resurrection"],
                title: "State of the Dead: The Sleep",
                summary: "This scripture discusses the reality that death is an unconscious sleep until the resurrection.",
                pillar: "Fundamental Belief #26",
                egw: "In 'Desire of Ages,' White clarifies that to the believer, death is but a sleep—a moment of silence before the morning of the resurrection.",
                pastoral: "This truth protects us from spiritualism. We know that our life is hid with Christ in God until the last trumpet sounds."
            }
        ];

        const DEFAULT_INSIGHT = {
            title: "General Biblical Insight",
            summary: "This passage provides a foundation for understanding God's character and His plan for humanity.",
            pillar: "Biblical Hermeneutics",
            egw: "Ellen White suggests reading every scripture through the lens of the 'Great Controversy'—the ongoing struggle to restore God's image in man.",
            pastoral: "As Adventist researchers, we ask: How does this verse prepare me for the Second Coming? Every word is a lamp unto our feet."
        };

        const App = () => {
            const [view, setView] = useState('camera'); 
            const [photo, setPhoto] = useState(null);
            const [extractedText, setExtractedText] = useState("");
            const [analysis, setAnalysis] = useState(null);
            const [isLoading, setIsLoading] = useState(false);
            const [status, setStatus] = useState("Initializing...");
            const [apiKey, setApiKey] = useState(localStorage.getItem('sda_api_key') || "");
            const [showSettings, setShowSettings] = useState(false);
            const [cameraError, setCameraError] = useState(false);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const fileInputRef = useRef(null);

            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [view, analysis, isLoading, showSettings, cameraError]);

            useEffect(() => {
                if (view === "camera") startCamera();
                else stopCamera();
                return () => stopCamera();
            }, [view]);

            const startCamera = async () => {
                setCameraError(false);
                setStatus("Searching for camera...");
                
                try {
                    // Try 1: Back camera (ideal for mobile)
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: { ideal: 'environment' } } 
                    });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                    setStatus("Align verse in frame");
                } catch (err) {
                    console.warn("Back camera not found, trying any available...", err);
                    try {
                        // Try 2: Any camera (fallback for desktop)
                        const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
                        if (videoRef.current) videoRef.current.srcObject = fallbackStream;
                        setStatus("Align verse in frame");
                    } catch (finalErr) {
                        console.error("No camera hardware found:", finalErr);
                        setCameraError(true);
                        setStatus("Hardware not found. Use upload.");
                    }
                }
            };

            const stopCamera = () => {
                if (videoRef.current && videoRef.current.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                }
            };

            const handleCapture = () => {
                const canvas = canvasRef.current;
                const video = videoRef.current;
                
                if (!video || !canvas || video.videoWidth === 0) {
                    setStatus("Waiting for video feed...");
                    return;
                }

                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const context = canvas.getContext('2d');
                context.drawImage(video, 0, 0);
                
                const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                processImage(dataUrl);
            };

            const processImage = async (imageData) => {
                setPhoto(imageData);
                setView("results");
                setIsLoading(true);
                setStatus("Reading verse...");
                
                try {
                    const { data: { text } } = await Tesseract.recognize(imageData, 'eng', {
                        logger: m => {
                            if (m.status === 'recognizing text') {
                                setStatus(`Reading: ${Math.round(m.progress * 100)}%`);
                            }
                        }
                    });

                    const cleanText = text.replace(/\s+/g, ' ').trim();
                    setExtractedText(cleanText || "Genesis 1:1");
                    
                    if (apiKey && cleanText) {
                        setStatus("Consulting Cloud...");
                        await performOnlineResearch(cleanText);
                    } else {
                        setStatus("Mapping pillars...");
                        const lowerText = cleanText.toLowerCase();
                        const match = LOCAL_LIBRARY.find(item => 
                            item.keywords.some(keyword => lowerText.includes(keyword))
                        );
                        setAnalysis(match || DEFAULT_INSIGHT);
                        setIsLoading(false);
                    }
                } catch (err) {
                    console.error("OCR Error:", err);
                    setExtractedText("Sample Verse Loaded");
                    setAnalysis(DEFAULT_INSIGHT);
                    setIsLoading(false);
                }
            };

            const performOnlineResearch = async (text) => {
                const prompt = `You are an SDA Biblical Research Scholar. Verse: "${text}". 
                Analysis components: 1. A 1-sentence summary. 2. Identify the SDA Fundamental Belief. 3. E.G. White insight. 4. Pastoral commentary focusing on Three Angels' Messages.`;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }]
                        })
                    });
                    const data = await response.json();
                    const aiText = data.candidates[0].content.parts[0].text;
                    
                    setAnalysis({
                        title: "Cloud Research Result",
                        summary: aiText.split('\n')[0] || "Prophetic overview generated.",
                        pillar: "SDA Systematic Theology",
                        egw: aiText.split('\n').find(l => l.toLowerCase().includes('white')) || "Insight from the Spirit of Prophecy.",
                        pastoral: aiText.substring(aiText.length / 2)
                    });
                } catch (e) {
                    setAnalysis(DEFAULT_INSIGHT);
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="h-screen bg-slate-50 flex flex-col max-w-md mx-auto shadow-2xl relative overflow-hidden">
                    <header className="bg-sda-blue text-white p-5 pt-12 md:pt-6 shadow-lg flex items-center justify-between z-50">
                        <div className="flex items-center gap-3">
                            <div className="bg-amber-400 p-2 rounded-xl">
                                <i data-lucide="scroll" className="text-[#2b4c7e] w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="font-extrabold text-lg tracking-tight">Scripture Lens</h1>
                                <p className="text-[9px] text-blue-200 font-bold uppercase tracking-[0.2em] italic">Prophetic Research</p>
                            </div>
                        </div>
                        <div className={`px-3 py-1 rounded-full flex items-center gap-2 border ${apiKey ? 'border-green-400 bg-green-400/10' : 'border-red-400 bg-red-400/10'}`}>
                             <div className={`w-2 h-2 rounded-full ${apiKey ? 'bg-green-400' : 'bg-red-500 animate-pulse'}`}></div>
                             <span className="text-[9px] font-bold uppercase tracking-widest">{apiKey ? 'Online' : 'Offline'}</span>
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden flex flex-col bg-white">
                        {view === 'camera' && (
                            <div className="flex-1 flex flex-col">
                                <div className="flex-1 bg-black relative flex items-center justify-center overflow-hidden">
                                    {cameraError ? (
                                        <div className="text-center p-10 text-slate-500 animate-in fade-in duration-500">
                                            <i data-lucide="camera-off" className="w-16 h-16 mx-auto mb-4 opacity-20"></i>
                                            <p className="text-sm font-bold uppercase tracking-widest text-white">Camera Unavailable</p>
                                            <p className="text-xs italic mt-2 text-slate-400">Hardware not detected. No problem! Use the upload button below to select a photo of your verse.</p>
                                            <button 
                                                onClick={() => fileInputRef.current.click()}
                                                className="mt-6 px-6 py-3 bg-amber-400 text-sda-blue rounded-xl font-bold flex items-center gap-2 mx-auto active:scale-95 transition-all"
                                            >
                                                <i data-lucide="image" className="w-4 h-4"></i> Upload Verse Photo
                                            </button>
                                        </div>
                                    ) : (
                                        <>
                                            <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover opacity-70" />
                                            <div className="absolute inset-0 pointer-events-none flex items-center justify-center p-12">
                                                <div className="w-full aspect-[3/4] border-2 border-amber-400/30 rounded-3xl relative shadow-[0_0_0_999px_rgba(0,0,0,0.6)]">
                                                    <div className="scanning-line"></div>
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </div>
                                <div className="p-8 bg-white border-t-[6px] border-sda-blue rounded-t-[40px] -mt-10 z-30 flex flex-col items-center gap-6 shadow-2xl">
                                    <div className="flex items-center gap-10">
                                        <button onClick={() => setShowSettings(true)} className="p-4 text-slate-300 hover:text-sda-blue transition-colors"><i data-lucide="settings" className="w-7 h-7"></i></button>
                                        <button 
                                            onClick={handleCapture} 
                                            disabled={cameraError}
                                            className={`w-20 h-20 rounded-full bg-sda-blue border-[8px] border-slate-50 shadow-2xl flex items-center justify-center active:scale-90 transition-all ${cameraError ? 'opacity-20 grayscale' : ''}`}
                                        >
                                            <i data-lucide="camera" className="text-white w-8 h-8"></i>
                                        </button>
                                        <button onClick={() => fileInputRef.current.click()} className="p-4 text-slate-300 hover:text-sda-blue transition-colors"><i data-lucide="image" className="w-7 h-7"></i></button>
                                    </div>
                                    <span className="px-4 py-1 bg-slate-100 rounded-full text-[9px] text-sda-blue font-black uppercase tracking-[0.2em]">{status}</span>
                                </div>
                            </div>
                        )}

                        {view === 'results' && (
                            <div className="flex-1 flex flex-col p-5 space-y-5 overflow-y-auto custom-scrollbar pb-10 animate-in fade-in slide-in-from-bottom-4 duration-500">
                                <div className="relative rounded-2xl shadow-xl border overflow-hidden shrink-0 h-40">
                                    <img src={photo} className="w-full h-full object-cover" />
                                    <div className="absolute inset-0 bg-gradient-to-t from-sda-blue via-transparent flex flex-col justify-end p-4">
                                        <p className="text-white text-[10px] font-bold uppercase mb-1 opacity-70 tracking-widest">Captured Text</p>
                                        <p className="text-white text-sm serif-italic italic line-clamp-2">"{extractedText}"</p>
                                    </div>
                                </div>
                                
                                {isLoading ? (
                                    <div className="py-20 text-center space-y-4">
                                        <div className="w-12 h-12 border-4 border-sda-blue border-t-amber-400 rounded-full animate-spin mx-auto"></div>
                                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{status}</p>
                                    </div>
                                ) : (
                                    <div className="space-y-5">
                                        <div className="bg-slate-50 p-4 rounded-xl border-l-4 border-amber-400 shadow-sm">
                                            <h3 className="text-amber-700 font-black text-[9px] uppercase tracking-widest mb-1">Verse Summary</h3>
                                            <p className="text-slate-600 text-sm italic">"{analysis.summary}"</p>
                                        </div>

                                        <div className="space-y-4">
                                            <h3 className="text-sda-blue font-black text-[10px] uppercase tracking-widest flex items-center gap-2">
                                                <i data-lucide="shield-check" className="w-4 h-4 text-amber-500"></i> {analysis.pillar}
                                            </h3>
                                            <h2 className="text-slate-800 font-extrabold text-xl leading-tight">{analysis.title}</h2>
                                            
                                            <div className="p-5 bg-blue-50/50 rounded-2xl border border-blue-100 shadow-sm">
                                                <span className="text-[9px] font-bold text-sda-blue uppercase mb-2 block tracking-widest">Prophetic Insight</span>
                                                <p className="text-slate-700 text-[14px] leading-relaxed serif-italic italic">{analysis.egw}</p>
                                            </div>

                                            <div className="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                                <span className="text-[9px] font-bold text-amber-600 uppercase mb-2 block tracking-widest">Pastoral Perspective</span>
                                                <p className="text-slate-600 text-[13px] leading-relaxed">{analysis.pastoral}</p>
                                            </div>
                                        </div>
                                        
                                        <button onClick={() => setView('camera')} className="w-full py-4 bg-sda-blue text-white rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                                            <i data-lucide="refresh-cw" className="w-5 h-5"></i> New Research Scan
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {}
                    {showSettings && (
                        <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-sm z-[100] flex items-end animate-in fade-in duration-300">
                            <div className="w-full bg-white rounded-t-[40px] p-8 space-y-6 shadow-2xl">
                                <div className="flex items-center justify-between">
                                    <h2 className="text-xl font-extrabold text-sda-blue">Configuration</h2>
                                    <button onClick={() => setShowSettings(false)} className="p-2 bg-slate-100 rounded-full"><i data-lucide="x" className="w-5 h-5 text-slate-400"></i></button>
                                </div>
                                <div className="space-y-4">
                                    <label className="block">
                                        <span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2 block">Gemini API Key</span>
                                        <input 
                                            type="password" 
                                            className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-sda-blue transition-all"
                                            placeholder="Paste Key here..."
                                            value={apiKey}
                                            onChange={(e) => {
                                                setApiKey(e.target.value);
                                                localStorage.setItem('sda_api_key', e.target.value);
                                            }}
                                        />
                                    </label>
                                    <p className="text-[10px] text-slate-400 italic">If empty, the app uses the built-in prophetic library for offline study.</p>
                                </div>
                                <button onClick={() => setShowSettings(false)} className="w-full py-4 bg-sda-blue text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all">Save & Return</button>
                            </div>
                        </div>
                    )}

                    <canvas ref={canvasRef} className="hidden" />
                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={(e) => {
                        if (e.target.files && e.target.files[0]) {
                            const reader = new FileReader();
                            reader.onload = (ev) => processImage(ev.target.result);
                            reader.readAsDataURL(e.target.files[0]);
                        }
                    }} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
